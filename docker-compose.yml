services:
  app-dev:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: "5173"
    volumes:
      - .:/app
      - deno-cache:/deno-dir
    command: deno task dev:docker

  app-prod:
    profiles: ["prod"]
    build:
      context: .
      target: prod-runner
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: "8000"

volumes:
  deno-cache:
